<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Peter Pan - Batalha Naval</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Segoe UI',sans-serif;
    background-size: cover;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.card{
    width:1000px;
    max-width:95%;
    background-color: rgba(255,255,255,0.5);
    border-radius:25px;
    overflow:hidden;
    box-shadow:0 15px 40px rgba(0,0,0,.3);
    display:flex;
}
.fundo{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:-1;
}
.lado-esquerdo{
    width:35%;
    background:linear-gradient(180deg,#4CAF50,#1B5E20);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    color:white;
    padding:25px;
}

.foto{
    width:250px;
    height:250px;
    border-radius:50%;
    border:6px solid white;
    overflow:hidden;
    box-shadow:0 0 25px rgba(255,255,255,.6);

}

.foto img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.lado-esquerdo h2{
    margin-top:15px;
    font-size:2rem;
}

.subtitulo{
    opacity:.9;
    margin-top:5px;
}

.lado-direito{
    width:65%;
    padding:40px;
    display:flex;
    flex-direction:column;
    justify-content:center;
}

.titulo{
    color:#2E7D32;
    margin-bottom:20px;
    font-size:2.2rem;
}

.balao{
    background:#f7f7f7;
    padding:25px;
    border-radius:20px;
    min-height:220px;
    position:relative;
    font-size:1.2rem;
    line-height:1.8;
}

.balao::before{
    content:"";
    position:absolute;
    left:-18px;
    top:50px;
    border-width:12px 18px 12px 0;
    border-style:solid;
    border-color:transparent #f7f7f7 transparent transparent;
}

#fala{
    border-right:3px solid #222;
    animation:piscar .8s infinite;
}

@keyframes piscar{
    50%{
        border-color:transparent;
    }
}

.controles{
    margin-top:20px;
}

button{
    background:#2E7D32;
    color:white;
    border:none;
    padding:12px 24px;
    border-radius:10px;
    cursor:pointer;
    font-size:1rem;
    transition:.3s;
}

button:hover{
    background:#1B5E20;
    transform:scale(1.05);
}
</style>
</head>
<body>
    <video class="fundo" autoplay muted loop>
    <source src="fundo.mp4" type="video/mp4">
    </video>

<div class="card">

    <div class="lado-esquerdo">

        <div class="foto">
            <img src=peterf.gif>
        </div>

        <h2>Peter Pan</h2>
        <p class="subtitulo">Seu guia da Terra do Nunca</p>

    </div>

    <div class="lado-direito">

        <h1 class="titulo">Como Jogar Batalha Naval</h1>

        <div class="balao">
            <span id="fala"></span>
        </div>

        <div class="controles">
            <button onclick="reiniciar()">
                Ler Novamente
            </button>
        </div>

    </div>

</div>

<script>

const texto =
"Olá, aventureiro! Eu sou Peter Pan! "
+ "Bem-vindo à Terra do Nunca e ao jogo Batalha Naval. "
+ "Neste jogo, você terá um tabuleiro aonde tem barco, bombas e água. "
+ "Em cada rodada você escolhe uma coordenada. "
+ "Pode encontrar um barco, uma bomba ou apenas água. "
+ "O objetivo é localizar e afundar todos os navios. "
+ "Use estratégia, atenção e muita coragem. "
+ "Boa sorte marinheiro(a)!";

const velocidade = 40;
const campoFala = document.getElementById("fala");

let indice = 0;

function escreverTexto(){
    if(indice < texto.length){
        campoFala.innerHTML += texto.charAt(indice);
        indice++;
        setTimeout(escreverTexto, velocidade);
    }
}

function iniciar(){
    campoFala.innerHTML = "";
    indice = 0;

    escreverTexto();

    setTimeout(() => {
        falarTexto();
    }, 500);
}

function reiniciar(){
    speechSynthesis.cancel();
    iniciar();
}

window.onload = () => {

    if(speechSynthesis.getVoices().length === 0){
        speechSynthesis.onvoiceschanged = iniciar;
    }else{
        iniciar();
    }

};

</script>

</body>
</html>
