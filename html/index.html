<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="../css/style-tabuleiro.css">
    <title>Batalha Naval</title>

   <style>

        body{
            text-align:center;
            font-family:Arial, Helvetica, sans-serif;
        }

        #tabuleiro{
            margin:auto;
            border-collapse:collapse;
        }

        #tabuleiro td{
            border:1px solid black;
            width:50px;
            height:50px;
            text-align:center;
        }

        #overlay{
            position:fixed;
            top:0;
            left:0;
            width:100%;
            height:100%;
            background:rgba(0,0,0,0.7);

            display:none;

            justify-content:center;
            align-items:center;
        }

        #janelaFinal{
            background:white;
            padding:20px;
            border-radius:10px;
        }

        #areaVidas{
            margin:20px;
        }

    </style>
</head>

<body>

    <h1>Batalha Naval</h1>

    <div id="areaVidas"></div>

    <h2>
        Pontos:
        <span id="pontos">0</span>
    </h2>

    <h2>
        Barcos encontrados:
        <span id="barcos">0</span>
    </h2>

    <h2>
        Barcos restantes:
        <span id="restantes">30</span>
    </h2>

    <h2>
        Jogadas:
        <span id="jogadas">0</span>
    </h2>

    <table id="tabuleiro"></table>

    <br>

    <button onclick="novoJogo()">
        Novo Jogo
    </button>

    <div id="overlay">

        <div id="janelaFinal">

            <h1 id="textoFinal"></h1>

            <button onclick="novoJogo()">
                Jogar Novamente
            </button>

        </div>

    </div>

    <script src="../script/script-jogo.js"></script>
</body>
</html>
