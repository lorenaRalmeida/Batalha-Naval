<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Batalha Naval</title>
 <link rel="stylesheet" href="../css/style-tutorial.css">
</head>
<body>
    <!-- vídeo de fundo -->
<video class="fundo" autoplay muted loop>
    <source src="../vídeos/vid tutorial/fundot.mp4" type="video/mp4">
</video>

<!-- card principal -->
<div class="card">

    <!-- lado esquerdo -->
    <div class="lado-esquerdo">

        <!-- foto -->
        <div class="foto">
            <img src="../vídeos/vid tutorial/peterf.gif">
        </div>

        <!-- nome -->
        <h2>Peter Pan</h2>

        <!-- subtítulo -->
        <p class="subtitulo">Seu guia da Terra do Nunca</p>

    </div>

    <!-- lado direito -->
    <div class="lado-direito">

        <!-- título -->
        <h1 class="titulo">Como Jogar Batalha Naval</h1>

        <!-- caixa do texto -->
        <div class="balao">
            <span id="fala"></span>
        </div>

        <!-- botões -->
        <div class="controles">

            <!-- botão para ler novamente -->
            <button onclick="reiniciar()">
                Ler Novamente
            </button>

            <!-- botão voltar -->
            <button onclick="voltarPagina()">
                Voltar
            </button>

        </div>

    </div>

</div>

<!-- Áudio -->
<audio id="audio" loop>
    <source src="audio1.mp3" type="audio/mpeg">
</audio>
 <script src="../script/script-tutorial.js"></script> 

</body>
</html>
