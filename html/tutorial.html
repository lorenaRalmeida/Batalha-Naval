<!DOCTYPE html>
<html lang="pt-BR">
<head>

<!-- configurações da página -->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- título da aba -->
<title>Luffy - Batalha Naval</title>

<!-- link do css-->
<link rel="stylesheet" href="../css/style-tutorial.css">
</head>

<body>

<!-- botão tocar música -->
<div class="botao-musica">
    <button onclick="tocarMusica()">
        Tocar Música
    </button>
</div>

<div class="fundo">
    <img src="marine.jpg" alt="">
</div>

<div class="overlay"></div>

<!-- card principal -->
<div class="card">

    <!-- lado esquerdo -->
    <div class="lado-esquerdo">

        <!-- foto -->
        <div class="foto">
            <img src="luffy.jpg">
        </div>

        <!-- nome -->
        <h2>Monkey D. Luffy</h2>

        <!-- subtítulo -->
        <p class="subtitulo">
            O futuro Rei dos Piratas!
        </p>

    </div>

    <!-- lado direito -->
    <div class="lado-direito">

        <!-- título -->
        <h1 class="titulo">Como Jogar Batalha Naval</h1>

        <!-- caixa do texto -->
        <div class="balao">
            <span id="fala"></span>
        </div>

        <!-- botões -->
        <div class="controles">

            <!-- botão para ler novamente -->
            <button onclick="lerNovamente()">
                Ler Novamente
            </button>

            <!-- botão voltar -->
            <button onclick="voltarPagina()">
                Voltar
            </button>

        </div>

    </div>

</div>

<!-- Áudio -->
<audio id="audio" loop>
    <source src="audio.mp3" type="audio/mpeg">
</audio>

<!--link do script-->
<script src="../script/script-tutorial.js"></script> 

</body>
</html>
